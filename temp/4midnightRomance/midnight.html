  <body class ="overflow-hidden">
    <!-- music -->
    <audio src="assets/audio/wedding.mp3" loop class="music"></audio>

    <!-- sfx door -->
    <audio src="assets/audio/door.mp3" class = "sound-door"></audio>

    <!-- door section -->
    <div id="door-section" class="open" onclick="mulai()">
      <h1 class="heading-door left huruf-sambung">Nobita</h1>
      <h1 class="heading-door right huruf-sambung">Shizuka</h1>
      <div class ="doors">
        <div class="door left">
          <img src="assets/img/door-left.jpg" alt="left door">
        </div>
        <div class="door right">
          <img src="assets/img/door-right.jpg" alt="right door">
        </div>
      </div>
    </div>

    <!-- content section -->
     <div id="content-section">
        <!-- navbar -->
         <ul class="nav">
            <span class="nav-music"></span>
            <li>
                <a href="#acara-section">
                    <i class="fas fa-fw fa-calendar-day"></i>
                </a>
            </li>
            <li>
                <a href="#lokasi-section">
                    <i class="fas fa-fw fa-location-dot"></i>
                </a>
            </li>
            <li>
                <a href="#love-story-section">
                    <i class="fas fa-fw fa-heart"></i>
                </a>
            </li>
            <li>
                <a href="#" class="nav-item-music rotate" id="music-button"  onclick="toggleMusic(event)">
                    <i class="fas fa-fw fa-compact-disc"></i>
                </a>
            </li>
            <li>
                <a href="#gallery-section">
                    <i class="fas fa-fw fa-image"></i>
                </a>
            </li>
            <li>
                <a href="#gift-section">
                    <i class="fas fa-fw fa-gift"></i>
                </a>
            </li>
            <li>
                <a href="#rsvp-section">
                    <i class="fas fa-fw fa-check-to-slot"></i>
                </a>
            </li>
         </ul>
     </div>





    <!-- jquery3 -->
